name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    quality:
        name: Lint, typecheck & build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - run: npm ci
            - run: npm run format:check
            - run: npm run lint
            - run: npm run typecheck
            - run: npm run build

    test:
        name: Test (${{ matrix.os }}, node ${{ matrix.node }})
        runs-on: ${{ matrix.os }}
        # Node 26 is forward-compatibility only (Current release; LTS from Oct 2026) — non-blocking.
        continue-on-error: ${{ matrix.node == 26 }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest]
                node: [24, 26]
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm
            - run: npm ci
            - run: npm run test:coverage
            - if: matrix.os == 'ubuntu-latest' && matrix.node == 24
              uses: actions/upload-artifact@v7
              with:
                  name: coverage
                  path: coverage/
                  if-no-files-found: ignore
