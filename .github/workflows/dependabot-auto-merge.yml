name: Dependabot auto-merge

# Auto-merges Dependabot patch & minor updates once the required status checks pass
# (enable auto-merge waits for them). Major updates are left for manual review.
# Requires repository auto-merge to be enabled.
# https://docs.github.com/en/code-security/tutorials/secure-your-dependencies/automate-dependabot-with-actions

on: pull_request

permissions:
    contents: write
    pull-requests: write

jobs:
    dependabot:
        name: Enable auto-merge for Dependabot
        runs-on: ubuntu-latest
        if: ${{ github.actor == 'dependabot[bot]' }}
        steps:
            - name: Fetch Dependabot metadata
              id: metadata
              uses: dependabot/fetch-metadata@v3
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Enable auto-merge for patch & minor updates
              if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor' }}
              run: gh pr merge --auto --squash "$PR_URL"
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
