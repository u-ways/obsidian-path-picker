# Dependabot version updates. Runs monthly for npm dependencies and GitHub Actions.
# PRs are labelled `dependencies` so the release notes group them under
# "⬆️ Dependency Updates" (see .github/release.yml), and the Dependabot auto-merge
# workflow merges patch/minor updates once required checks pass.
# https://docs.github.com/en/code-security/tutorials/secure-your-dependencies/dependabot-quickstart
version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "monthly"
      labels:
          - "dependencies"
      ignore:
          # @eslint/js is held at v9 because eslint-plugin-obsidianmd@0.3.x peer-requires
          # @eslint/js ^9.30.1 (eslint itself is on v10). Re-allow the major once that
          # plugin supports @eslint/js v10.
          - dependency-name: "@eslint/js"
            update-types:
                - "version-update:semver-major"
      groups:
          # One batched PR for all minor/patch npm bumps; majors come as individual
          # PRs so they are reviewed (and not auto-merged) by hand.
          npm-minor-patch:
              patterns:
                  - "*"
              update-types:
                  - "minor"
                  - "patch"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "monthly"
      labels:
          - "dependencies"
      ignore:
          # These actions appear ONLY in the gh-aw-generated release-detailer.lock.yml,
          # which `gh aw compile` SHA-pins and regenerates. Bumping them via Dependabot
          # would just desync the generated lock (and the minor ones would auto-merge),
          # so ignore them. Actions used by the hand-written workflows (checkout,
          # setup-node, upload-artifact, …) are still updated normally.
          - dependency-name: "github/gh-aw-actions"
          - dependency-name: "actions/cache"
          - dependency-name: "actions/download-artifact"
          - dependency-name: "actions/github-script"
      groups:
          actions-minor-patch:
              patterns:
                  - "*"
              update-types:
                  - "minor"
                  - "patch"
